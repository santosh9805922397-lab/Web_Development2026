<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Here's the Feedback Form</title>
</head>
<body>

    <h1> Feedback Form</h1>

    <form>

        <!-- Full Name -->
        <label for="fullname">Full Name:</label><br>
        <input type="text" id="fullname" name="fullname"
               placeholder="Enter your full name"
               minlength="3"
               required><br><br>

        <!-- Email -->
        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email"
               placeholder="example@gmail.com"
               required><br><br>

        <!-- Rating -->
        <h3>Rating</h3>

        <input type="radio" id="verysatisfied" name="rating">
        <label for="verysatisfied">Very Satisfied</label><br>


        <input type="radio" id="satisfied" name="rating">
        <label for="satisfied">Satisfied</label><br>

        <input type="radio" id="neutral" name="rating">
        <label for="neutral">Neutral</label><br>

        <input type="radio" id="unsatisfied" name="rating">
        <label for="unsatisfied">Unsatisfied</label><br><br>

        <!-- Interests -->
        <h3>Interests</h3>

        <input type="checkbox" id="webdev" name="interest">
        <label for="webdev">Web Development</label><br>

        <input type="checkbox" id="mobiledev" name="interest">
        <label for="mobiledev">Mobile Development</label><br>

        <input type="checkbox" id="ai" name="interest">
        <label for="ai">AI & Machine Learning</label><br><br>

        <!-- Country -->
        <label for="country">Select Country:</label><br>
        <select id="country" name="country" required>
            <option value="">--Choose Country--</option>
            <option value="nepal">Nepal</option>
            <option value="india">India</option>
            <option value="usa">USA</option>
        </select><br><br>

        <!-- Feedback -->
        <label for="message">Write your feedback here:</label><br>
        <textarea id="message" name="message"
                  rows="5"
                  cols="30"
                  maxlength="200"
                  placeholder="Write your feedback..."></textarea><br><br>

        <!-- Submit -->
        <input type="submit" value="Submit">

    </form>

</body>
</html>
