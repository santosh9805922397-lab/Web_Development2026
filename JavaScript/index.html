<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Tasks</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>JavaScript Practice Tasks</h1>


    <h2>1. Even or Odd Checker</h2>

    <input type="number" id="numberInput" placeholder="Enter number">
    <button onclick="checkEvenOdd()">Check</button>

    <p id="evenOddResult"></p>



    <h2>2. Multiplication Table Generator</h2>

    <input type="number" id="tableInput" placeholder="Enter number">
    <button onclick="generateTable()">Generate</button>

    <pre id="tableResult"></pre>




    <h2>3. FizzBuzz Challenge</h2>

    <button onclick="fizzBuzz()">Run FizzBuzz</button>

    <pre id="fizzResult"></pre>




    <h2>4. Square Pattern</h2>

    <input type="number" id="squareInput" placeholder="Enter size">
    <button onclick="squarePattern()">Create Square</button>

    <pre id="squareResult"></pre>




    <h2>5. Right Angled Triangle</h2>

    <input type="number" id="triangleInput" placeholder="Enter size">
    <button onclick="trianglePattern()">Create Triangle</button>

    <pre id="triangleResult"></pre>





    <h2>Dynamic Color Changer</h2>


    <div id="colorBox">
        Change my color
    </div>


    <input type="color" id="colorPicker">

    <button id="resetBtn">
        Reset Color
    </button>
<script src="index.js"></script>

</body>
</html>
